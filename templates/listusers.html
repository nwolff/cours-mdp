{% extends "base.html" %}
{% block title %}Users{% endblock %}

{% block content %}
<h1>Users</h1>
<table>
    <tr>
        <th>username</th>
        <th>password</th>
        <th>strategy</th>
        <th>created</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{user.username}}</td>
        <td>{{user.password}}</td>
        <td>{{user.strategy}}</td>
        <td>{{user.created}}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
